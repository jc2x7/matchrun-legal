<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchRun - Conectando Strava...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🏃</div>
    <div class="title">Voltando para o MatchRun...</div>
    <div class="subtitle">Conectando sua conta do Strava</div>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="error" style="display:none"></div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');

      if (code) {
        // Redirect back to app via deep link
        window.location.href = 'tindecorrida://strava?code=' + encodeURIComponent(code);

        // Fallback message if redirect doesn't work after 3s
        setTimeout(function() {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent =
            'Se o app nao abriu automaticamente, volte para o MatchRun e tente novamente.';
        }, 3000);
      } else {
        // Error or user denied access
        window.location.href = 'tindecorrida://strava?error=' + encodeURIComponent(error || 'access_denied');

        setTimeout(function() {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent =
            'Acesso negado ou erro na conexao. Volte ao MatchRun e tente novamente.';
        }, 3000);
      }
    })();
  </script>
</body>
</html>
